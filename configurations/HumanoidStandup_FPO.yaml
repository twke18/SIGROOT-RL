env:
  name: HumanoidStandup-v4
  num_envs: 16
  seed: 42

policy:
  hidden_dims: [512, 512]
  activation: tanh
  num_flow_samples: 8
  flow_steps: 10

algorithm:
  gamma: 0.99
  gae_lambda: 0.95
  value_loss_coef: 0.5
  clip_eps: 0.05
  n_mc: 8
  epochs_per_update: 5
  minibatch_size: 256
  learning_rate: 1.0e-4
  max_grad_norm: 0.5

training:
  total_epochs: 1000
  rollout_steps: 2048
  test_interval: 10
  test_episodes: 5
  video_interval: 50
  checkpoint_interval: 50
  success_threshold: 50000.0
